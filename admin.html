<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Administração</title>
<style>
:root {
  --bg: #f5f7fa; --bg2: #fff; --border: #dde3ec; --text: #1a2233;
  --text2: #5a6880; --accent: #095C18; --accent2: #0d7a22; --accent-light: #e8f5ec;
  --red: #c0392b; --red-light: #fce4ec; --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,.08);
}
[data-theme="dark"] {
  --bg: #0f1117; --bg2: #1a1d27; --border: #2a2f3f; --text: #e8ecf4;
  --text2: #8899bb; --accent: #1aad3a; --accent2: #23d44e; --accent-light: #0d2015;
  --red-light: #2d0a0a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header {
  background: var(--accent); color: #fff; padding: 0 24px;
  display: flex; align-items: center; gap: 16px; height: 56px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
header h1 small { font-weight: 400; opacity: .75; font-size: .8rem; display: block; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 0 2px rgba(76,175,80,.3); transition: background .4s; }
.status-dot.syncing { background: #ffc107; }
.status-dot.error   { background: #f44336; }
.btn-icon { background: rgba(255,255,255,.15); border: none; color: #fff; border-radius: 6px; width: 34px; height: 34px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.btn-icon:hover { background: rgba(255,255,255,.3); }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 200;
}
.login-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 40px; width: 360px; box-shadow: var(--shadow);
}
.login-card h2 { font-size: 1.3rem; margin-bottom: 8px; color: var(--accent); }
.login-card p { font-size: .85rem; color: var(--text2); margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 4px; color: var(--text2); }
.form-group input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: .9rem; outline: none; }
.form-group input:focus { border-color: var(--accent); }
#login-error { color: var(--red); font-size: .85rem; margin-bottom: 12px; display: none; }
#login-btn { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; }
#login-btn:hover { background: var(--accent2); }
#login-btn:disabled { opacity: .6; cursor: default; }

/* APP */
#app-screen { display: none; }
main { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.toolbar input[type="search"] {
  flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: .9rem; outline: none;
}
.toolbar input[type="search"]:focus { border-color: var(--accent); }
.btn { padding: 8px 14px; border-radius: var(--radius); border: none; cursor: pointer; font-size: .85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: background .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-outline { background: var(--bg2); border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1px solid var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; background: var(--bg2); font-size: .85rem; }
thead th { background: var(--accent); color: #fff; padding: 9px 12px; text-align: left; white-space: nowrap; font-weight: 600; position: sticky; top: 56px; }
thead th:last-child { width: 130px; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:hover { background: var(--accent-light); }
tbody td { padding: 8px 12px; vertical-align: middle; }
tbody td:last-child { white-space: nowrap; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }

/* BADGE */
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
.badge-vigente  { background: #e8f5ec; color: #1b6b2a; }
.badge-avencer  { background: #fff3e0; color: #a0580a; }
.badge-urgente  { background: #fce4ec; color: #b71c1c; }
.badge-expirado { background: #fafafa; color: #666; border: 1px solid #ddd; }
.badge-default  { background: var(--accent-light); color: var(--accent); }

/* PAGINATION */
.pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 0; font-size: .85rem; color: var(--text2); }
.pagination button { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg2); border-radius: 6px; cursor: pointer; color: var(--text); }
.pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.pagination button:disabled { opacity: .4; cursor: default; }

/* MODAL FORM */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 16px;
}
#modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: var(--radius); max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.3); }
.modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 1.1rem; font-weight: 600; }
.modal-body { padding: 16px 24px; }
.modal-footer { padding: 0 24px 20px; display: flex; gap: 8px; justify-content: flex-end; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
.form-grid .form-group { margin-bottom: 0; }
.form-grid .form-group.full { grid-column: 1 / -1; }
.form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: .9rem; outline: none; resize: vertical; min-height: 80px; font-family: inherit; }
.form-group textarea:focus { border-color: var(--accent); }

/* LOADING BAR */
#loading-bar { height: 3px; background: var(--accent); width: 0; transition: width .4s; position: fixed; top: 0; left: 0; z-index: 500; }

/* TOAST */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 20px; font-size: .88rem; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; color: #fff; }
#toast.ok  { background: var(--accent); }
#toast.err { background: var(--red); }
</style>
</head>
<body>

<div id="loading-bar"></div>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h2>🔒 SEMA/AC</h2>
    <p>Painel Administrativo — Termos de Cooperação Técnica</p>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="login-error">Senha incorreta. Tente novamente.</div>
    <button id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="status-dot" id="status-dot"></div>
    <h1>SEMA/AC — Administração
      <small>Editor da Planilha de Cooperações</small>
    </h1>
    <span id="last-sync" style="font-size:.75rem;opacity:.8"></span>
    <button class="btn-icon" onclick="syncAll()" title="Sincronizar agora">🔄</button>
    <button class="btn-icon" id="btn-theme" title="Alternar tema" onclick="toggleTheme()">🌙</button>
    <button class="btn-icon" onclick="doLogout()" title="Sair" style="background:rgba(255,0,0,.2)">⏏</button>
  </header>

  <main>
    <div class="toolbar">
      <input type="search" id="search-input" placeholder="🔍 Buscar…" oninput="applyFilters()">
      <button class="btn btn-primary" onclick="openNew()">+ Novo registro</button>
      <button class="btn btn-outline" onclick="exportCSV()">⬇ CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- Modal formulário -->
<div id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Novo registro</h2>
      <button class="btn-icon" onclick="closeModal()" style="color:var(--text2);background:var(--border)">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid" id="form-fields"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveRecord()">💾 Salvar</button>
    </div>
  </div>
</div>

<script>
/* ─── CONFIG ─────────────────────────────────────────────────────────────── */
let GAS_URL   = 'https://script.google.com/macros/s/SEU_SCRIPT_ID/exec';
let SYNC_TOKEN = '%%SYNC_TOKEN%%';
let SENHA_HASH = '%%SENHA_HASH%%';

// Valores injetados pelo CI (config.js carregado abaixo)
if (typeof SEMA_CONFIG !== 'undefined') {
  if (SEMA_CONFIG.appsScriptUrl) GAS_URL    = SEMA_CONFIG.appsScriptUrl;
  if (SEMA_CONFIG.syncToken)     SYNC_TOKEN  = SEMA_CONFIG.syncToken;
  if (SEMA_CONFIG.senhaHash)     SENHA_HASH  = SEMA_CONFIG.senhaHash;
}

const POLL_MS = 120_000;

/* ─── ESTADO ─────────────────────────────────────────────────────────────── */
let _schema   = [];   // [{key, label, col}]
let _records  = [];
let _filtered = [];
let _page     = 1;
const PAGE    = 50;
let _editRecord = null;   // registro sendo editado (null = novo)
let _pollTimer  = null;

/* ─── LOGIN ──────────────────────────────────────────────────────────────── */
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

let _failCount = 0;
let _lockUntil = 0;

async function doLogin() {
  const pass = document.getElementById('login-pass').value;
  if (!pass) return;

  if (Date.now() < _lockUntil) {
    showErr(`Aguarde ${Math.ceil((_lockUntil - Date.now())/1000)}s para tentar novamente`);
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Verificando…';

  const hash = await sha256(pass);
  const expected = SENHA_HASH;

  // Aceita qualquer senha se o hash não foi configurado (placeholder)
  const ok = expected === '%%SENHA_HASH%%' || hash === expected;

  btn.disabled = false; btn.textContent = 'Entrar';

  if (!ok) {
    _failCount++;
    if (_failCount >= 3) { _lockUntil = Date.now() + 30_000; _failCount = 0; }
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }

  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  loadTheme();
  await startApp();
}

function doLogout() {
  clearInterval(_pollTimer);
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
}

/* ─── APP ────────────────────────────────────────────────────────────────── */
async function startApp() {
  // Re-ler config.js agora que app está ativo
  if (typeof SEMA_CONFIG !== 'undefined') {
    if (SEMA_CONFIG.appsScriptUrl) GAS_URL   = SEMA_CONFIG.appsScriptUrl;
    if (SEMA_CONFIG.syncToken)     SYNC_TOKEN = SEMA_CONFIG.syncToken;
  }
  await syncAll();
  _pollTimer = setInterval(syncAll, POLL_MS);
}

async function syncAll() {
  setStatus('syncing');
  loadingBar(30);
  try {
    const [schemaRes, listRes] = await Promise.all([
      gasGet('schema'),
      gasGet('list'),
    ]);
    loadingBar(80);

    if (Array.isArray(schemaRes.columns) && schemaRes.columns.length) {
      _schema = schemaRes.columns;
    } else if (Array.isArray(schemaRes.publicColumns)) {
      _schema = schemaRes.publicColumns.map(k => ({ key: k, label: k }));
    }

    if (Array.isArray(listRes.records)) {
      _records = listRes.records;
    }

    applyFilters();
    setStatus('ok');
    document.getElementById('last-sync').textContent =
      'Sync: ' + new Date().toLocaleTimeString('pt-BR');
  } catch (e) {
    setStatus('error');
    showToast('Erro ao carregar dados: ' + e.message, 'err');
  } finally {
    loadingBar(100);
    setTimeout(() => loadingBar(0), 400);
  }
}

/* ─── API ────────────────────────────────────────────────────────────────── */
async function gasGet(action) {
  const url = GAS_URL + (GAS_URL.includes('?') ? '&' : '?') + 'action=' + action;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function gasPost(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(JSON.stringify({ ...body, token: SYNC_TOKEN })),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

/* ─── RENDER ─────────────────────────────────────────────────────────────── */
function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  _filtered = q
    ? _records.filter(r => Object.values(r).join(' ').toLowerCase().includes(q))
    : [..._records];
  _page = 1;
  renderTable();
  renderPagination();
}

function renderTable() {
  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');

  if (!_schema.length) {
    thead.innerHTML = '<th style="opacity:.6">Aguardando dados…</th>';
    tbody.innerHTML = '';
    return;
  }

  thead.innerHTML = _schema.map(c => `<th>${esc(c.label)}</th>`).join('') + '<th>Ações</th>';

  const start = (_page - 1) * PAGE;
  const rows  = _filtered.slice(start, start + PAGE);

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${_schema.length + 1}" class="empty-state">Nenhum registro encontrado</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const cells = _schema.map(col => {
      let raw = String(r[col.key] || '').trim();
      const kL = col.key.toLowerCase();
      let cell;
      if (kL === 'status' || kL === 'situacao') cell = statusBadge(raw);
      else if (raw.startsWith('http')) cell = `<a href="${esc(raw)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗</a>`;
      else if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) cell = raw.split('-').reverse().join('/');
      else cell = esc(raw) || '<span style="color:var(--text2)">—</span>';
      return `<td>${cell}</td>`;
    }).join('');

    const idx = start + i;
    return `<tr>
      ${cells}
      <td>
        <button class="btn btn-outline" style="padding:4px 10px;font-size:.8rem" onclick="openEdit(${idx})">✏️</button>
        <button class="btn btn-danger"  style="padding:4px 10px;font-size:.8rem;margin-left:4px" onclick="deleteRecord(${idx})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const total = _filtered.length;
  const pages = Math.ceil(total / PAGE);
  const pg = document.getElementById('pagination');
  if (pages <= 1) {
    pg.innerHTML = total ? `<span>${total} registro${total!==1?'s':''}</span>` : '';
    return;
  }
  pg.innerHTML = `
    <button onclick="goPage(${_page-1})" ${_page<=1?'disabled':''}>‹</button>
    <span>Página ${_page} / ${pages} (${total} registros)</span>
    <button onclick="goPage(${_page+1})" ${_page>=pages?'disabled':''}>›</button>
  `;
}

function goPage(n) {
  const pages = Math.ceil(_filtered.length / PAGE);
  if (n < 1 || n > pages) return;
  _page = n;
  renderTable();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─── MODAL FORMULÁRIO ───────────────────────────────────────────────────── */
function openNew() {
  _editRecord = null;
  document.getElementById('modal-title').textContent = 'Novo registro';
  buildForm({});
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(idx) {
  _editRecord = { ..._filtered[idx] };
  document.getElementById('modal-title').textContent = 'Editar registro';
  buildForm(_editRecord);
  document.getElementById('modal-overlay').classList.add('open');
}

function buildForm(data) {
  const typeKey = findKey(['tipo','type']);
  const numKey  = findKey(['num','numero','número']);
  const longKeys = ['objeto','obs','notas','observacoes','observações','descricao','descrição'];

  const html = _schema.map(col => {
    const kL = col.key.toLowerCase();
    const isLong = longKeys.some(k => kL.includes(k));
    const isDate = kL.includes('inicio') || kL.includes('início') || kL.includes('termino') || kL.includes('término') || kL.includes('data');
    const isUrl  = kL.includes('link') || kL.includes('url');
    const isReq  = col.key === typeKey || col.key === numKey;

    let raw = String(data[col.key] || '').trim();
    // Converte yyyy-mm-dd para input[type=date]
    const dateVal = /^\d{4}-\d{2}-\d{2}$/.test(raw) ? raw : '';
    const fullClass = isLong ? 'full' : '';

    let input;
    if (isLong) {
      input = `<textarea id="f_${col.key}" rows="3">${esc(raw)}</textarea>`;
    } else if (isDate) {
      input = `<input type="date" id="f_${col.key}" value="${esc(dateVal)}">`;
    } else if (isUrl) {
      input = `<input type="url" id="f_${col.key}" value="${esc(raw)}" placeholder="https://…">`;
    } else {
      input = `<input type="text" id="f_${col.key}" value="${esc(raw)}"${isReq?' required':''}>`;
    }

    return `<div class="form-group ${fullClass}">
      <label>${esc(col.label)}${isReq?' <span style="color:var(--red)">*</span>':''}</label>
      ${input}
    </div>`;
  }).join('');

  document.getElementById('form-fields').innerHTML = html;
  // Focus no primeiro campo
  const first = document.querySelector('#form-fields input, #form-fields textarea');
  if (first) setTimeout(() => first.focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function saveRecord() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Salvando…';

  try {
    const rec = {};
    _schema.forEach(col => {
      const el = document.getElementById('f_' + col.key);
      if (el) rec[col.key] = el.value.trim();
    });

    const typeKey = findKey(['tipo','type']);
    const numKey  = findKey(['num','numero','número']);
    const tipo = typeKey && rec[typeKey] ? rec[typeKey] : (rec.tipo || '');
    const num  = numKey  && rec[numKey]  ? rec[numKey]  : (rec.num || rec.numero || '');

    if (!tipo || !num) {
      showToast('Tipo e Número são obrigatórios', 'err');
      btn.disabled = false; btn.textContent = '💾 Salvar';
      return;
    }

    // Normalizar chaves para o backend
    const record = { ...rec, tipo, num };

    await gasPost({ action: 'upsert', record });
    showToast(_editRecord ? 'Registro atualizado ✓' : 'Registro inserido ✓', 'ok');
    closeModal();
    await syncAll();
  } catch (e) {
    showToast('Erro ao salvar: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = '💾 Salvar';
  }
}

async function deleteRecord(idx) {
  const r = _filtered[idx];
  if (!r) return;

  const typeKey = findKey(['tipo','type']);
  const numKey  = findKey(['num','numero','número']);
  const tipo = typeKey ? r[typeKey] : (r.tipo || '');
  const num  = numKey  ? r[numKey]  : (r.num || r.numero || '');

  if (!tipo || !num) { showToast('Registro sem tipo/número — não é possível deletar', 'err'); return; }
  if (!confirm(`Deletar ${tipo} ${num}?\n\nEsta ação remove a linha da planilha Google Sheets e não pode ser desfeita.`)) return;

  try {
    setStatus('syncing');
    await gasPost({ action: 'delete', tipo, num });
    showToast(`${tipo} ${num} deletado ✓`, 'ok');
    await syncAll();
  } catch (e) {
    showToast('Erro ao deletar: ' + e.message, 'err');
    setStatus('error');
  }
}

/* ─── EXPORT CSV ─────────────────────────────────────────────────────────── */
function exportCSV() {
  if (!_filtered.length) { showToast('Nenhum dado para exportar'); return; }
  const sep = ';';
  const header = _schema.map(c => `"${c.label}"`).join(sep);
  const rows   = _filtered.map(r =>
    _schema.map(c => `"${String(r[c.key]||'').replace(/"/g,'""')}"`).join(sep)
  );
  const blob = new Blob(['﻿' + [header,...rows].join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `ADMIN_TCT_${new Date().toISOString().slice(0,10)}.csv` });
  a.click(); URL.revokeObjectURL(a.href);
  showToast(`${_filtered.length} registros exportados`);
}

/* ─── HELPERS ────────────────────────────────────────────────────────────── */
function findKey(candidates) {
  for (const c of candidates) {
    const col = _schema.find(s =>
      s.key === c ||
      s.key.replace(/_/g,'') === c.replace(/_/g,'') ||
      s.label.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'_') === c
    );
    if (col) return col.key;
  }
  return null;
}

function statusBadge(st) {
  const sL = (st||'').toLowerCase();
  let cls = 'badge-default';
  if      (sL.includes('vigente') && !sL.includes('vence')) cls = 'badge-vigente';
  else if (sL.includes('vence em 30'))   cls = 'badge-urgente';
  else if (sL.includes('vencer'))        cls = 'badge-avencer';
  else if (sL.includes('expir'))         cls = 'badge-expirado';
  return `<span class="badge ${cls}">${esc(st)}</span>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(s) {
  const d = document.getElementById('status-dot');
  if (d) d.className = 'status-dot' + (s==='ok' ? '' : s==='syncing' ? ' syncing' : ' error');
}

function loadingBar(pct) {
  const b = document.getElementById('loading-bar');
  b.style.width = pct + '%';
  b.style.opacity = pct > 0 && pct < 100 ? '1' : '0';
}

function showErr(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

let _toastT;
function showToast(msg, type = 'ok', dur = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type; t.style.opacity = '1';
  clearTimeout(_toastT); _toastT = setTimeout(() => { t.style.opacity = '0'; }, dur);
}

/* ─── TEMA ───────────────────────────────────────────────────────────────── */
function loadTheme() {
  const s = localStorage.getItem('sema_theme') || 'light';
  document.documentElement.setAttribute('data-theme', s);
  const b = document.getElementById('btn-theme'); if (b) b.textContent = s==='dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur  = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('sema_theme', next);
  const b = document.getElementById('btn-theme'); if (b) b.textContent = next==='dark' ? '☀️' : '🌙';
}

/* ─── START ──────────────────────────────────────────────────────────────── */
loadTheme();
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-pass').focus();
});
</script>
