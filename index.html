<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMA/AC — Termos de Cooperação Técnica</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/config.js"></script>
<style>
:root {
  --bg: #f5f7fa; --bg2: #fff; --border: #dde3ec; --text: #1a2233;
  --text2: #5a6880; --accent: #095C18; --accent2: #0d7a22; --accent-light: #e8f5ec;
  --red: #c0392b; --red-light: #fce4ec; --yellow: #d4860a; --blue: #1565c0;
  --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,.08);
}
[data-theme="dark"] {
  --bg: #0f1117; --bg2: #1a1d27; --border: #2a2f3f; --text: #e8ecf4;
  --text2: #8899bb; --accent: #1aad3a; --accent2: #23d44e; --accent-light: #0d2015;
  --red-light: #2d0a0a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }

/* HEADER */
header {
  background: var(--accent); color: #fff; padding: 0 24px;
  display: flex; align-items: center; gap: 16px; height: 56px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
header h1 small { font-weight: 400; opacity: .75; font-size: .8rem; display: block; }
.sema-logo { display:flex; align-items:center; flex:1; gap:0; }
.sl-s { font-size:22px; font-weight:900; color:#1FAD35; letter-spacing:-1px; }
.sl-d { width:2px; height:28px; background:#F5C71A; margin:0 10px; flex-shrink:0; }
.sl-f { display:flex; flex-direction:column; }
.sl-f span { font-size:7.5px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; line-height:1.75; color:rgba(255,255,255,.78); display:block; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 0 2px rgba(76,175,80,.3); transition: background .4s; }
.status-dot.syncing { background: #ffc107; }
.status-dot.error   { background: #f44336; }
#last-update { font-size: .75rem; opacity: .8; white-space: nowrap; }
.btn-icon { background: rgba(255,255,255,.15); border: none; color: #fff; border-radius: 6px; width: 34px; height: 34px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.btn-icon:hover { background: rgba(255,255,255,.3); }

/* ERROR BANNER */
.error-banner { background: var(--red-light); border-bottom: 2px solid var(--red); padding: 10px 24px; font-size: .85rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.error-banner[hidden] { display: none; }
.btn-retry { padding: 4px 12px; border: 1px solid var(--red); border-radius: 6px; background: none; color: var(--red); cursor: pointer; font-size: .82rem; font-weight: 600; }
#cache-note { font-size: .78rem; color: var(--text2); }
#cache-note[hidden] { display: none; }

/* MAIN */
main { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

/* KPIS */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: box-shadow .2s; }
.kpi:hover { box-shadow: var(--shadow); }
.kpi.active { border-color: var(--accent); background: var(--accent-light); }
.kpi-num { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1; }
.kpi-num.red { color: var(--red); }
.kpi-num.yellow { color: var(--yellow); }
.kpi-num.blue { color: var(--blue); }
.kpi-label { font-size: .8rem; color: var(--text2); margin-top: 4px; }

/* CHARTS */
.charts-section { margin-bottom: 24px; }
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.chart-title { font-size: .78rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
.chart-wrap { position: relative; height: 180px; }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.toolbar input[type="search"] {
  flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: .9rem; outline: none;
}
.toolbar input[type="search"]:focus { border-color: var(--accent); }
.toolbar select {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg2); color: var(--text); font-size: .85rem; cursor: pointer;
}
.btn { padding: 8px 14px; border-radius: var(--radius); border: none; cursor: pointer; font-size: .85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: background .2s; }
.btn-outline { background: var(--bg2); border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; background: var(--bg2); font-size: .88rem; }
thead th { background: var(--accent); color: #fff; padding: 10px 12px; text-align: left; white-space: nowrap; font-weight: 600; position: sticky; top: 56px; cursor: pointer; user-select: none; }
thead th:hover { background: var(--accent2); }
tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:hover { background: var(--accent-light); cursor: pointer; }
tbody td { padding: 9px 12px; vertical-align: middle; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
.badge-vigente  { background: #e8f5ec; color: #1b6b2a; }
.badge-avencer  { background: #fff3e0; color: #a0580a; }
.badge-urgente  { background: #fce4ec; color: #b71c1c; }
.badge-expirado { background: #fafafa; color: #666; border: 1px solid #ddd; }
.badge-default  { background: var(--accent-light); color: var(--accent); }
.empty-state    { text-align: center; padding: 60px 20px; color: var(--text2); }

/* SKELETON */
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton { height: 14px; border-radius: 4px; background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }

/* LOADING */
#loading-bar { height: 3px; background: var(--accent); width: 0; transition: width .4s; position: fixed; top: 0; left: 0; z-index: 500; }

/* MODAL */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 16px;
}
#modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: var(--radius); max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.3); }
.modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: flex-start; }
.modal-header h2 { font-size: 1.1rem; font-weight: 600; }
.modal-body { padding: 16px 24px 24px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
@media (max-width: 500px) { .field-grid { grid-template-columns: 1fr; } }
.field-item label { font-size: .75rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 2px; }
.field-item .val { font-size: .9rem; word-break: break-word; }

/* TOAST */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: .88rem; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }

/* PAGINATION */
.pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 0; font-size: .85rem; color: var(--text2); }
.pagination button { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg2); border-radius: 6px; cursor: pointer; color: var(--text); }
.pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.pagination button:disabled { opacity: .4; cursor: default; }

@media (max-width: 600px) { header h1 small { display: none; } .kpi-num { font-size: 1.5rem; } }
</style>
</head>
<body>

<div id="loading-bar"></div>

<header>
  <div class="status-dot" id="status-dot"></div>
  <div class="sema-logo" aria-label="SEMA — Secretaria de Estado do Meio Ambiente do Acre">
    <span class="sl-s">SEMA</span>
    <div class="sl-d" aria-hidden="true"></div>
    <div class="sl-f"><span>Secretaria de Estado</span><span>do Meio Ambiente — AC</span></div>
  </div>
  <span id="last-update"></span>
  <button class="btn-icon" id="btn-refresh" title="Atualizar dados" onclick="manualRefresh()">🔄</button>
  <button class="btn-icon" id="btn-theme" title="Alternar tema" onclick="toggleTheme()">🌙</button>
</header>

<div id="error-banner" class="error-banner" hidden>
  <span>⚠️ Dados ao vivo indisponíveis.</span>
  <span id="error-detail" style="font-size:.78rem;opacity:.75"></span>
  <button class="btn-retry" onclick="manualRefresh()">🔄 Tentar novamente</button>
  <span id="cache-note" hidden></span>
</div>

<div id="toast"></div>

<main>
  <div class="kpi-grid">
    <div class="kpi" id="kpi-vigente" onclick="filterByStatus('Vigente')">
      <div class="kpi-num" id="kpi-vigente-num">–</div>
      <div class="kpi-label">Vigentes</div>
    </div>
    <div class="kpi" id="kpi-avencer" onclick="filterByStatus('A vencer')">
      <div class="kpi-num yellow" id="kpi-avencer-num">–</div>
      <div class="kpi-label">A vencer (90 dias)</div>
    </div>
    <div class="kpi" id="kpi-urgente" onclick="filterByStatus('Vence em 30 dias')">
      <div class="kpi-num red" id="kpi-urgente-num">–</div>
      <div class="kpi-label">Urgente (30 dias)</div>
    </div>
    <div class="kpi" id="kpi-expirado" onclick="filterByStatus('Expirado')">
      <div class="kpi-num" id="kpi-expirado-num">–</div>
      <div class="kpi-label">Expirados</div>
    </div>
    <div class="kpi" style="cursor:default">
      <div class="kpi-num blue" id="kpi-parceiros-num">–</div>
      <div class="kpi-label">Parceiros únicos</div>
    </div>
  </div>

  <div class="charts-section" id="charts-section" style="display:none">
    <div class="charts-grid">
      <div class="chart-card" id="chart-card-status" style="display:none">
        <div class="chart-title">Situação</div>
        <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
      </div>
      <div class="chart-card" id="chart-card-tipo" style="display:none">
        <div class="chart-title">Por Tipo</div>
        <div class="chart-wrap"><canvas id="chart-tipo"></canvas></div>
      </div>
      <div class="chart-card" id="chart-card-ano" style="display:none">
        <div class="chart-title">Vencimentos por Ano</div>
        <div class="chart-wrap"><canvas id="chart-ano"></canvas></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <input type="search" id="search-input" placeholder="🔍 Buscar em qualquer campo…" oninput="applyFilters()">
    <select id="filter-col1" onchange="applyFilters()"><option value="">Todos os tipos</option></select>
    <select id="filter-col2" onchange="applyFilters()"><option value="">Todos os status</option></select>
    <select id="filter-col3" onchange="applyFilters()"><option value="">Todas as áreas</option></select>
    <button class="btn btn-outline" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn btn-outline" onclick="clearFilters()">✕ Limpar</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr id="table-head"><th colspan="1" style="text-align:center;opacity:.6">Carregando…</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<div id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">Detalhes</h2>
      <button class="btn-icon" onclick="closeModal()" style="color:var(--text2);background:var(--border)">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-grid" id="modal-fields"></div>
    </div>
  </div>
</div>

<script>
/* ─── CONFIG ─────────────────────────────────────────────────────────────── */
let GAS_URL = 'https://script.google.com/macros/s/SEU_SCRIPT_ID/exec';

const POLL_MS    = 60_000;
const CACHE_KEY  = 'sema_data_v2';
const CACHE_TTL  = 5 * 60 * 1000;  // 5 min
const RETRY_DELAYS = [5000, 15000, 30000, 60000];
const CHART_COLORS = ['#1FAD35','#F5C71A','#E05B3A','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F97316'];

/* ─── ESTADO ──────────────────────────────────────────────────────────────── */
let _schema   = [];
let _records  = [];
let _filtered = [];
let _page     = 1;
const PAGE    = 50;
let _kpiFilt  = '';
let _filterDefs = [];
let _sortCol  = null;
let _sortAsc  = true;
let _loading  = true;
let _retryCount = 0;
let _charts   = {};

/* ─── INICIALIZAÇÃO ───────────────────────────────────────────────────────── */
function init() {
  loadTheme();
  if (typeof SEMA_CONFIG !== 'undefined' && SEMA_CONFIG.appsScriptUrl)
    GAS_URL = SEMA_CONFIG.appsScriptUrl;

  // Render cache immediately for instant page load
  const cached = loadCache();
  if (cached) {
    _schema = cached.schema;
    _records = cached.records;
    buildFilterDefs();
    renderAll();
    showCacheNote('Exibindo cache · Atualizando…');
  }

  syncWithRetry().then(() => {
    setInterval(syncWithRetry, POLL_MS);
  });
}

/* ─── SYNC COM RETRY ──────────────────────────────────────────────────────── */
async function syncWithRetry() {
  try {
    await syncAll();
    _retryCount = 0;
    document.getElementById('error-banner').hidden = true;
    showCacheNote('');
  } catch (e) {
    console.error('[SEMA] syncWithRetry falhou:', e.message);
    setStatus('error');
    document.getElementById('error-banner').hidden = false;
    document.getElementById('error-detail').textContent = e.message || '';
    // Show cached data if available and schema not yet loaded
    if (!_schema.length) {
      const cached = loadCache();
      if (cached) {
        _schema = cached.schema; _records = cached.records;
        buildFilterDefs(); renderAll();
        showCacheNote('Sem conexão · Exibindo dados em cache');
      } else {
        showCacheNote('Sem conexão e sem cache local');
      }
    } else {
      showCacheNote('Sem conexão · Exibindo dados anteriores');
    }
    if (_retryCount < RETRY_DELAYS.length) {
      setTimeout(syncWithRetry, RETRY_DELAYS[_retryCount++]);
    }
  }
}

async function manualRefresh() {
  _retryCount = 0;
  document.getElementById('error-banner').hidden = true;
  showCacheNote('');
  await syncWithRetry();
}

async function syncAll() {
  setStatus('syncing');
  loadingBar(30);
  try {
    const [schemaRes, listRes] = await Promise.all([gasGet('schema'), gasGet('list')]);
    loadingBar(80);

    if (schemaRes.error) throw new Error('GAS schema: ' + schemaRes.error);
    if (listRes.error)   throw new Error('GAS list: '   + listRes.error);

    if (Array.isArray(schemaRes.columns) && schemaRes.columns.length)
      _schema = schemaRes.columns;
    else if (Array.isArray(schemaRes.publicColumns))
      _schema = schemaRes.publicColumns.map(k => ({ key: k, label: k }));

    if (Array.isArray(listRes.records)) _records = listRes.records;

    _loading = false;
    saveCache();
    buildFilterDefs();
    renderAll();
    setStatus('ok');
    document.getElementById('last-update').textContent =
      'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  } finally {
    loadingBar(100);
    setTimeout(() => loadingBar(0), 400);
  }
}

/* ─── API ─────────────────────────────────────────────────────────────────── */
async function gasGet(action) {
  const url = GAS_URL + (GAS_URL.includes('?') ? '&' : '?') + 'action=' + action;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

/* ─── CACHE ───────────────────────────────────────────────────────────────── */
function saveCache() {
  if (!_schema.length) return;
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), schema: _schema, records: _records })); } catch {}
}

function loadCache() {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (c && Date.now() - c.ts < CACHE_TTL) return c;
  } catch {}
  return null;
}

function showCacheNote(msg) {
  const el = document.getElementById('cache-note');
  if (!el) return;
  el.textContent = msg;
  el.hidden = !msg;
}

/* ─── FILTROS DINÂMICOS ───────────────────────────────────────────────────── */
function buildFilterDefs() {
  const typeKey   = findKey(['tipo', 'type', 'instrumento']);
  const statusKey = findKey(['status', 'situacao', 'situação']);
  const areaKey   = findKey(['area', 'área', 'tema', 'eixo']);

  _filterDefs = [
    { id: 'filter-col1', key: typeKey,   placeholder: 'Todos os tipos'  },
    { id: 'filter-col2', key: statusKey, placeholder: 'Todos os status' },
    { id: 'filter-col3', key: areaKey,   placeholder: 'Todas as áreas'  },
  ];

  _filterDefs.forEach(({ id, key, placeholder }) => {
    const sel = document.getElementById(id);
    sel.innerHTML = `<option value="">${placeholder}</option>`;
    if (!key) { sel.style.display = 'none'; return; }
    sel.style.display = '';
    const vals = [...new Set(_records.map(r => String(r[key]||'').trim()).filter(Boolean))].sort();
    vals.forEach(v => sel.add(new Option(v, v)));
  });
}

/* ─── RENDER ──────────────────────────────────────────────────────────────── */
function renderAll() {
  renderKPIs();
  applyFilters();
  renderCharts();
}

function renderKPIs() {
  const statusCol = _schema.find(c => c.key === 'status' || c.key === 'situacao');
  const kpiGrid   = document.querySelector('.kpi-grid');
  if (!statusCol) { if (kpiGrid) kpiGrid.style.display = 'none'; return; }
  if (kpiGrid) kpiGrid.style.display = '';

  const instKey = findKey(['inst', 'instituicao', 'instituição', 'parceiro', 'entidade']);
  const counts  = {};
  const parcSet = new Set();

  _records.forEach(r => {
    const st = String(r[statusCol.key] || '').trim();
    if (st) counts[st] = (counts[st] || 0) + 1;
    if (instKey) { const v = String(r[instKey]||'').trim(); if (v) parcSet.add(v.toLowerCase()); }
  });

  setText('kpi-vigente-num',  counts['Vigente']          || 0);
  setText('kpi-avencer-num',  counts['A vencer']         || 0);
  setText('kpi-urgente-num',  counts['Vence em 30 dias'] || 0);
  setText('kpi-expirado-num', counts['Expirado']         || 0);
  setText('kpi-parceiros-num', parcSet.size);
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();

  _filtered = _records.filter(r => {
    for (const { id, key } of _filterDefs) {
      if (!key) continue;
      const sel = document.getElementById(id);
      if (sel && sel.value && String(r[key]||'').trim() !== sel.value) return false;
    }
    if (_kpiFilt) {
      const statusCol = _schema.find(c => c.key === 'status' || c.key === 'situacao');
      if (!statusCol) return false;
      if (String(r[statusCol.key]||'').trim() !== _kpiFilt) return false;
    }
    if (q) {
      if (!Object.values(r).join(' ').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  applySort();
  _page = 1;
  renderTable();
  renderPagination();
  updateKPIActive();
}

/* ─── SORTING ─────────────────────────────────────────────────────────────── */
function sortBy(key) {
  if (_sortCol === key) _sortAsc = !_sortAsc;
  else { _sortCol = key; _sortAsc = true; }
  _page = 1;
  applySort();
  renderTable();
  renderPagination();
}

function applySort() {
  if (!_sortCol) return;
  _filtered.sort((a, b) => {
    const va = String(a[_sortCol]||''), vb = String(b[_sortCol]||'');
    const cmp = va.localeCompare(vb, 'pt-BR', { numeric: true, sensitivity: 'base' });
    return _sortAsc ? cmp : -cmp;
  });
}

/* ─── TABLE ───────────────────────────────────────────────────────────────── */
function renderTable() {
  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');

  if (!_schema.length) {
    thead.innerHTML = '<th style="opacity:.6">Aguardando dados…</th>';
    tbody.innerHTML = '';
    return;
  }

  thead.innerHTML = _schema.map(c => {
    const sorted = _sortCol === c.key;
    const arrow  = sorted ? (_sortAsc ? ' ↑' : ' ↓') : ' ↕';
    return `<th onclick="sortBy('${c.key}')" title="Ordenar por ${esc(c.label)}">${esc(c.label)}<span style="opacity:.5;font-size:.75em">${arrow}</span></th>`;
  }).join('');

  const start = (_page - 1) * PAGE;
  const rows  = _filtered.slice(start, start + PAGE);

  if (_loading && !rows.length) {
    tbody.innerHTML = Array(6).fill(0).map(() =>
      `<tr>${_schema.map(() => `<td><div class="skeleton"></div></td>`).join('')}</tr>`
    ).join('');
    return;
  }

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${_schema.length}" class="empty-state">
      <div style="font-size:2rem;margin-bottom:8px">🔍</div>
      <div>Nenhum registro encontrado</div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const cells = _schema.map(col => {
      const raw = String(r[col.key] || '').trim();
      const kL  = col.key.toLowerCase();
      let cell;
      if (kL === 'status' || kL === 'situacao') cell = statusBadge(raw);
      else if (raw.startsWith('http')) cell = `<a href="${esc(raw)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Abrir</a>`;
      else if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) cell = raw.split('-').reverse().join('/');
      else cell = esc(raw) || '<span style="color:var(--text2)">—</span>';
      return `<td>${cell}</td>`;
    }).join('');
    return `<tr onclick="openModal(${start + i})">${cells}</tr>`;
  }).join('');
}

function renderPagination() {
  const total = _filtered.length;
  const pages = Math.ceil(total / PAGE);
  const pg = document.getElementById('pagination');
  if (pages <= 1) {
    pg.innerHTML = total ? `<span>${total} registro${total !== 1 ? 's' : ''}</span>` : '';
    return;
  }
  pg.innerHTML = `
    <button onclick="goPage(${_page-1})" ${_page<=1?'disabled':''}>‹ Anterior</button>
    <span>Página ${_page} de ${pages} &nbsp;(${total} registros)</span>
    <button onclick="goPage(${_page+1})" ${_page>=pages?'disabled':''}>Próxima ›</button>
  `;
}

function goPage(n) {
  const pages = Math.ceil(_filtered.length / PAGE);
  if (n < 1 || n > pages) return;
  _page = n;
  renderTable();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─── CHARTS ──────────────────────────────────────────────────────────────── */
function renderCharts() {
  if (typeof Chart === 'undefined') return;
  const statusCol = _schema.find(c => c.key === 'status' || c.key === 'situacao');
  const tipoCol   = _schema.find(c => c.key === 'tipo');
  const anoCol    = _schema.find(c => c.key === 'termino' || c.key === 'inicio');

  const section = document.getElementById('charts-section');
  if (!statusCol && !tipoCol && !anoCol) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  if (statusCol) _buildDonut('chart-status', 'chart-card-status', statusCol.key);
  else           document.getElementById('chart-card-status').style.display = 'none';

  if (tipoCol)   _buildBarH('chart-tipo', 'chart-card-tipo', tipoCol.key);
  else           document.getElementById('chart-card-tipo').style.display = 'none';

  if (anoCol)    _buildBarTimeline('chart-ano', 'chart-card-ano', anoCol.key);
  else           document.getElementById('chart-card-ano').style.display = 'none';
}

function _countBy(key) {
  const m = {};
  _filtered.forEach(r => { const v = String(r[key]||'—'); m[v] = (m[v]||0) + 1; });
  return m;
}

function _destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}

function _buildDonut(cid, cardId, key) {
  const counts = _countBy(key);
  const labels = Object.keys(counts), data = Object.values(counts);
  document.getElementById(cardId).style.display = labels.length ? 'block' : 'none';
  if (!labels.length) return;
  _destroyChart(cid);
  _charts[cid] = new Chart(document.getElementById(cid), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: CHART_COLORS.slice(0, labels.length), borderWidth: 2, borderColor: 'transparent' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } } },
  });
}

function _buildBarH(cid, cardId, key) {
  const sorted = Object.entries(_countBy(key)).sort((a,b) => b[1]-a[1]).slice(0, 8);
  const labels = sorted.map(([k])=>k), data = sorted.map(([,v])=>v);
  document.getElementById(cardId).style.display = labels.length ? 'block' : 'none';
  if (!labels.length) return;
  _destroyChart(cid);
  _charts[cid] = new Chart(document.getElementById(cid), {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: '#1FAD35', borderRadius: 4 }] },
    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } },
  });
}

function _buildBarTimeline(cid, cardId, key) {
  const byYear = {};
  _filtered.forEach(r => {
    const v = String(r[key]||''), yr = v.match(/^(\d{4})/)?.[1];
    if (yr && yr >= '2015') byYear[yr] = (byYear[yr]||0) + 1;
  });
  const labels = Object.keys(byYear).sort(), data = labels.map(y => byYear[y]);
  document.getElementById(cardId).style.display = labels.length ? 'block' : 'none';
  if (!labels.length) return;
  _destroyChart(cid);
  _charts[cid] = new Chart(document.getElementById(cid), {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: '#F5C71A', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } },
  });
}

/* ─── MODAL ───────────────────────────────────────────────────────────────── */
function openModal(idx) {
  const r = _filtered[idx];
  if (!r) return;
  const typeKey = findKey(['tipo','type']);
  const numKey  = findKey(['num','numero','número']);
  const parts   = [typeKey && r[typeKey], numKey && r[numKey]].filter(Boolean);
  document.getElementById('modal-title').textContent = parts.join(' ') || 'Detalhes';

  const html = _schema.map(col => {
    const raw = String(r[col.key]||'').trim();
    if (!raw) return '';
    const kL = col.key.toLowerCase();
    let val;
    if (kL === 'status' || kL === 'situacao') val = statusBadge(raw);
    else if (raw.startsWith('http')) val = `<a href="${esc(raw)}" target="_blank" rel="noopener">${esc(raw)}</a>`;
    else if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) val = raw.split('-').reverse().join('/');
    else val = esc(raw);
    return `<div class="field-item"><label>${esc(col.label)}</label><div class="val">${val}</div></div>`;
  }).filter(Boolean).join('');

  document.getElementById('modal-fields').innerHTML = html || '<p style="color:var(--text2)">Sem dados</p>';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ─── KPI FILTER ──────────────────────────────────────────────────────────── */
function filterByStatus(st) {
  _kpiFilt = (_kpiFilt === st) ? '' : st;
  applyFilters();
}
function updateKPIActive() {
  ['kpi-vigente','kpi-avencer','kpi-urgente','kpi-expirado'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  const map = { 'Vigente':'kpi-vigente', 'A vencer':'kpi-avencer', 'Vence em 30 dias':'kpi-urgente', 'Expirado':'kpi-expirado' };
  if (_kpiFilt && map[_kpiFilt]) document.getElementById(map[_kpiFilt]).classList.add('active');
}
function clearFilters() {
  document.getElementById('search-input').value = '';
  ['filter-col1','filter-col2','filter-col3'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  _kpiFilt  = '';
  _sortCol  = null;
  _sortAsc  = true;
  applyFilters();
}

/* ─── EXPORT CSV ──────────────────────────────────────────────────────────── */
function exportCSV() {
  if (!_filtered.length) { showToast('Nenhum dado para exportar'); return; }
  const sep = ';';
  const header = _schema.map(c => `"${c.label}"`).join(sep);
  const rows   = _filtered.map(r =>
    _schema.map(c => `"${String(r[c.key]||'').replace(/"/g,'""')}"`).join(sep));
  const blob = new Blob(['﻿' + [header,...rows].join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `TCT_SEMA_${new Date().toISOString().slice(0,10)}.csv`,
  });
  a.click(); URL.revokeObjectURL(a.href);
  showToast(`${_filtered.length} registros exportados`);
}

/* ─── HELPERS ─────────────────────────────────────────────────────────────── */
function findKey(candidates) {
  for (const c of candidates) {
    const col = _schema.find(s =>
      s.key === c ||
      s.key.replace(/_/g,'') === c.replace(/_/g,'') ||
      s.label.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'_') === c
    );
    if (col) return col.key;
  }
  return null;
}

function statusBadge(st) {
  const sL = (st||'').toLowerCase();
  let cls = 'badge-default';
  if      (sL.includes('vigente') && !sL.includes('vence')) cls = 'badge-vigente';
  else if (sL.includes('vence em 30'))   cls = 'badge-urgente';
  else if (sL.includes('vencer'))        cls = 'badge-avencer';
  else if (sL.includes('expir'))         cls = 'badge-expirado';
  return `<span class="badge ${cls}">${esc(st)}</span>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setText(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }
function setStatus(s) {
  const d = document.getElementById('status-dot');
  d.className = 'status-dot' + (s==='ok' ? '' : s==='syncing' ? ' syncing' : ' error');
}
function loadingBar(pct) {
  const b = document.getElementById('loading-bar');
  b.style.width = pct + '%';
  b.style.opacity = pct > 0 && pct < 100 ? '1' : '0';
}
let _toastT;
function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(_toastT); _toastT = setTimeout(() => { t.style.opacity = '0'; }, dur);
}
function loadTheme() {
  const s = localStorage.getItem('sema_theme') || 'light';
  document.documentElement.setAttribute('data-theme', s);
  document.getElementById('btn-theme').textContent = s==='dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur  = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('sema_theme', next);
  document.getElementById('btn-theme').textContent = next==='dark' ? '☀️' : '🌙';
}

/* ─── START ───────────────────────────────────────────────────────────────── */
init();
</script>
