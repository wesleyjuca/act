name: Deploy SEMA TCT → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar sintaxe JS
        run: |
          node --check js/config.js && echo "✅ js/config.js syntax OK"

      - name: Validar arquivos HTML e JS
        run: |
          for f in index.html js/config.js; do
            [ -f "$f" ] && echo "✅ $f ($(wc -c < $f) bytes)" || { echo "❌ $f ausente"; exit 1; }
          done
          echo "✅ Validação concluída"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Sumário do deploy
        run: |
          echo "## 🚀 Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Item | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Painel público | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit         | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
